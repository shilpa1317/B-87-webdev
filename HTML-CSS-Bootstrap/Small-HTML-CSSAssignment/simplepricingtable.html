<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple Pricing table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="Pricing-container">
        <!--basic plan-->
        <div class="card">
            <h2>Basic</h2>
            <h3>₹199/month</h3>
            <ul>
                <li> 5 project</li>
                <li>Baisc support</li>
            </ul>
            <button>choose plan</button>
        </div>
        <!-- standard plan-->
         <div class="card highlight">
            <h2>Standard</h2>
            <h3>₹399/month</h3>
            <ul>
                <li> 12 project</li>
                <li>pyrority support</li>
            </ul>
            <button>choose plan</button>
        </div>
        <!--premium plan-->
        <div class="card">
            <h2>premium</h2>
            <h3>₹799/month</h3>
            <ul>
                <li> unlimited project</li>
                <li>24/7 support</li>
            </ul>
            <button>choose plan</button>
        </div>

    </div>    
</body>
</html>
