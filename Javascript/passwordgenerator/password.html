<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-light">

<div class="container mt-5">
    <div class="col-md-6 mx-auto bg-white p-4 rounded shadow">

        <h3>🔐 Password Generator</h3>

        <!-- Password Length -->
        <label class="mt-3">Password Length:</label>
        <input type="number" class="form-control" min="4" max="20" id="length">

        <!-- Options -->
        <div class="mt-3">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="numbers" checked>
                <label class="form-check-label">Include Numbers</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="uppercase" checked>
                <label class="form-check-label">Include Uppercase</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="symbols" checked>
                <label class="form-check-label">Include Special Characters</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="exclude" checked>
                <label class="form-check-label">
                    Exclude ambiguous characters (i, l, 1, O, 0)
                </label>
            </div>
        </div>

        <!-- Button -->
        <button class="btn btn-primary mt-3 w-100" id="generateBtn">
            Generate Password
        </button>

        <!-- Output -->
        <p class="mt-3">Generated Password:</p>
        <input type="text" class="form-control" id="result" readonly>

        <!-- Show Password -->
        <div class="form-check mt-2">
            <input class="form-check-input" type="checkbox" id="showPassword">
            <label class="form-check-label">Show Password</label>
        </div>

        <!-- Strength Bar -->
        <div class="progress mt-3">
            <div class="progress-bar bg-success" style="width:100%">Very Strong</div>
        </div>

        <!-- Copy Button -->
        <button class="btn btn-outline-secondary mt-3 w-100">
            Copy
        </button>

    </div>
</div>


  </body>

<script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
